name: Azure Static Web Apps CI/CD

env:
  APP_LOCATION: "_site"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    # No need for id-token unless you're doing OIDC auth to Azure yourself.
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          submodules: true
          lfs: false

      - name: Dotnet Setup
        uses: actions/setup-dotnet@55ec9447dda3d1cf6bd587150f3262f30ee10815 # v3.4.2
        with:
          dotnet-version: 8.x

      - run: dotnet tool update -g docfx
      - run: docfx $GITHUB_WORKSPACE/docfx.json

      # Deploy only on push OR on non-fork PRs (secrets + OIDC are not available to fork PRs)
      - name: Deploy Static Web App
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          action: "upload"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_STONE_04C0B490F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          app_location: ${{ env.APP_LOCATION }}

      # Optional: Make it obvious in logs why deploy didn't run
      - name: Skip deploy for fork PRs (expected)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Fork PR detected - build ran, deploy intentionally skipped (no secrets/OIDC for forks)."

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@4d27395796ac319302594769cfe812bd207490b1 # v1
        with:
          action: "close"
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_VICTORIOUS_STONE_04C0B490F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}